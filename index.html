<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/Wheat_mine.png">
    <title>Validação de Formulário</title>
</head>

<body>

    <div class="container">

        <h2>Cadastro para Adoção</h2>
        <form id="formulario" action="">

            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" placeholder="Nome">
            <div id="erroNome" class="erro"></div>
            <br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" placeholder="Email">
            <div id="erroEmail" class="erro"></div>
            <br>

            <label for="telefone">Telefone:</label><br>
            <input type="tel" id="telefone" value="+55">
            <div id="erroTel" class="erro"></div>
            <br>

            <label for="cpf">CPF:</label><br>
            <input type="text" id="cpf" placeholder="XXX.XXX.XXX-XX">
            <div id="erroCpf" class="erro"></div>
            <br>

            <label for="idade">Idade:</label><br>
            <input type="number" id="idade" placeholder="30">
            <div id="erroIdade" class="erro"></div>
            <br>

            <label for="cidade">Cidade:</label><br>
            <input type="text" id="cidade" placeholder="São Paulo">
            <div id="erroCidade" class="erro"></div>
            <br>

            <h4>Tipo de Moradia:</h4>

            <input type="radio" name="Moradia" id="casa" value="Casa">
            <label for="moradia">Casa</label><br>
            <br>

            <input type="radio" name="Moradia" id="apartamento" value="Apartamento">
            <label for="moradia">Apartamento</label><br>

            <div id="erroCidade" class="erro"></div>
            <br>
            
            <h4>Possui Quintal?</h4>

            <input type="radio" name="Quintal" id="simQuintal" value="Sim">
            <label for="quintal">Sim</label><br>
            <br>

            <input type="radio" name="Quintal" id="naoQuintal" value="Não">
            <label for="quintal">Não</label><br>

            <div id="erroCidade" class="erro"></div>
            <br>

            <div id="botao">
                <button type="submit">Enviar</button>
            </div>

        </form>

        <div class="resultado" id="resultado"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
