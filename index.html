<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/Wheat_mine.png">
    <title>Validação de Formulário</title>
</head>

<body>

    <div class="container">

        <h2>Cadastro para Adoção</h2>
        <form id="formulario" action="">

            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" placeholder="Nome">
            <div id="erroNome" class="erro"></div>
            <br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" placeholder="Email">
            <div id="erroEmail" class="erro"></div>
            <br>

            <label for="telefone">Telefone:</label><br>
            <input type="tel" id="telefone" value="+55">
            <div id="erroTel" class="erro"></div>
            <br>

            <label for="cpf">CPF:</label><br>
            <input required type="text" id="cpf" placeholder="XXX.XXX.XXX-XX">
            <div id="erroCpf" class="erro"></div>
            <br>

            <label for="idade">Idade:</label><br>
            <input type="number" id="idade" placeholder="30">
            <div id="erroIdade" class="erro"></div>
            <br>

            <label for="cidade">Cidade:</label><br>
            <input type="text" id="cidade" placeholder="São Paulo" required>
            <div id="erroCidade" class="erro"></div>
            <br>

            <fieldset>
                <legend>Tipo de Moradia:</legend>
                <input type="radio" name="Moradia" id="casa" value="Casa" required>
                <label for="casa">Casa</label><br>
                <br>

                <input type="radio" name="Moradia" id="apartamento" value="Apartamento">
                <label for="apartamento">Apartamento</label><br>

                <div id="erroMoradia" class="erro"></div>
                <br>

                <div id="permissao">
                    <fieldset>
                        <legend>Permite Animais?</legend>

                        <input type="radio" name="Permissao" id="simPermissao" value="Sim" required>
                        <label for="simPermissao">Sim</label><br>
                        <br>

                        <input type="radio" name="Permissao" id="naoPermissao" value="Não">
                        <label for="naoPermissao">Não</label><br>
                        <br>
                    </fieldset>
                </div>
            </fieldset>



            <fieldset>
                <legend>Possui Quintal?</legend>

                <input type="radio" name="Quintal" id="simQuintal" value="Sim" required>
                <label for="quintal">Sim</label><br>
                <br>

                <input type="radio" name="Quintal" id="naoQuintal" value="Não">
                <label for="quintal">Não</label><br>

                <div id="erroQuintal" class="erro"></div>
                <br>
            </fieldset>

            <br>

            <fieldset req>
                <legend>Já teve Pet?</legend>

                <input type="radio" name="Pet" id="simPet" value="Sim" required>
                <label for="Pet">Sim</label><br>
                <br>

                <input type="radio" name="Pet" id="naoPet" value="Não">
                <label for="Pet">Não</label><br>

                <div id="erroPet" class="erro"></div>
                <br>
            </fieldset>

            <br>

            <label for="sozinho">Quantas <b>horas</b> o animal ficará <b>sozinho</b> por dia?</label><br>
            <div class="flex">
                <input type="number" id="sozinho" min="0" placeholder="2">
                <p>Horas</p>
            </div>

            <div id="erroSozinho" class="erro"></div>
            <br>

            <fieldset>
                <legend>Motivação:</legend>
                <label for="motivo"></label><br>
                <textarea id="motivo" rows="6" cols="30" placeholder="(min.10 caracteres)" minlength="10"></textarea>
                <div id="erroMotivo" class="erro"></div>

            </fieldset>

            <br>
            <input type="checkbox" id="termoUso" required>
            <label for="termoUso">Aceito os termos de uso</label>
            <div id="erroTermo" class="erro"></div>
            <br>


            <br>
            <div id="botao">
                <button type="submit">Enviar</button>
            </div>

        </form>

        <div class="resultado" id="resultado"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
